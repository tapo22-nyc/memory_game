<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Fav Party Games</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
      padding: 20px;
    }

    h1 {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: 2px;
      margin-bottom: 6px;
      background: linear-gradient(90deg, #f72585, #7209b7, #4cc9f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #a0aec0;
      margin-bottom: 24px;
      letter-spacing: 1px;
    }

    .stats {
      display: flex;
      gap: 32px;
      margin-bottom: 28px;
    }

    .stat-box {
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px;
      padding: 10px 28px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .stat-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #a0aec0;
      margin-bottom: 2px;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #4cc9f0;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 28px;
    }

    .card {
      width: 110px;
      height: 110px;
      cursor: pointer;
      perspective: 600px;
      user-select: none;
    }

    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 16px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 16px;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
    }

    .card-back {
      background: linear-gradient(135deg, #7209b7, #3a0ca3);
      border: 2px solid rgba(255,255,255,0.15);
      box-shadow: 0 4px 20px rgba(114,9,183,0.4);
    }

    .card-back::after {
      content: '✦';
      font-size: 1.8rem;
      color: rgba(255,255,255,0.25);
    }

    .card-front {
      background: linear-gradient(135deg, #0f3460, #16213e);
      border: 2px solid rgba(76,201,240,0.3);
      box-shadow: 0 4px 20px rgba(76,201,240,0.2);
      transform: rotateY(180deg);
    }

    .card.matched .card-front {
      background: linear-gradient(135deg, #06d6a0, #1b9aaa);
      border-color: rgba(6,214,160,0.6);
      box-shadow: 0 4px 24px rgba(6,214,160,0.45);
      animation: matchPulse 0.5s ease;
    }

    @keyframes matchPulse {
      0%   { transform: rotateY(180deg) scale(1); }
      50%  { transform: rotateY(180deg) scale(1.12); }
      100% { transform: rotateY(180deg) scale(1); }
    }

    .card:not(.flipped):not(.matched):hover .card-inner {
      transform: rotateY(15deg);
      box-shadow: 0 8px 30px rgba(247,37,133,0.3);
    }

    .btn {
      padding: 12px 36px;
      border: none;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      background: linear-gradient(90deg, #f72585, #7209b7);
      color: #fff;
      box-shadow: 0 4px 20px rgba(247,37,133,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(247,37,133,0.55);
    }

    .btn:active { transform: translateY(0); }

    .win-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,30,0.82);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 100;
      flex-direction: column;
      gap: 16px;
      animation: fadeIn 0.4s ease;
    }

    .win-overlay.show { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .win-card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 44px 56px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: popIn 0.45s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .win-emoji { font-size: 4rem; margin-bottom: 12px; }

    .win-title {
      font-size: 2.6rem;
      font-weight: 800;
      background: linear-gradient(90deg, #f72585, #4cc9f0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .win-stats {
      color: #a0aec0;
      font-size: 1rem;
      margin-bottom: 28px;
      line-height: 1.7;
    }

    .win-stats span { color: #4cc9f0; font-weight: 700; }

    @media (max-width: 500px) {
      .card { width: 72px; height: 72px; }
      .card-face { font-size: 1.8rem; }
      .grid { gap: 10px; }
      h1 { font-size: 1.8rem; }
      .stats { gap: 16px; }
      .stat-box { padding: 8px 18px; }
    }
  </style>
</head>
<body>

  <h1>Welcome to MTGames</h1>
  <p class="subtitle">Memory Game - Match all 4 pairs to win!</p>

  <div class="stats">
    <div class="stat-box">
      <div class="stat-label">Moves</div>
      <div class="stat-value" id="moves">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Time</div>
      <div class="stat-value" id="timer">0:00</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Pairs</div>
      <div class="stat-value" id="pairs">0/4</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <button class="btn" onclick="initGame()">Restart</button>

  <div class="win-overlay" id="winOverlay">
    <div class="win-card">
      <div class="win-emoji">🎉</div>
      <div class="win-title">You Win!</div>
      <div class="win-stats" id="winStats"></div>
      <button class="btn" onclick="initGame()">Play Again</button>
    </div>
  </div>

  <script>
    const EMOJIS = ['🐶','🐱','🦊','🐸','🦋','🌸','🍕','🍦'];
    const TOTAL_PAIRS = 4;

    let flipped = [], matched = 0, moves = 0, seconds = 0, timerID = null, locked = false;

    function shuffle(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function fmt(s) {
      return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
    }

    function startTimer() {
      stopTimer();
      seconds = 0;
      document.getElementById('timer').textContent = fmt(0);
      timerID = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = fmt(seconds);
      }, 1000);
    }

    function stopTimer() {
      clearInterval(timerID);
      timerID = null;
    }

    function initGame() {
      document.getElementById('winOverlay').classList.remove('show');
      stopTimer();
      flipped = []; matched = 0; moves = 0; locked = false;
      document.getElementById('moves').textContent = '0';
      document.getElementById('timer').textContent = '0:00';
      document.getElementById('pairs').textContent = `0/${TOTAL_PAIRS}`;

      const pool = shuffle([...EMOJIS]).slice(0, TOTAL_PAIRS);
      const cards = shuffle([...pool, ...pool]);
      const grid = document.getElementById('grid');
      grid.innerHTML = '';

      cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = emoji;
        card.dataset.index = i;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">${emoji}</div>
          </div>`;
        card.addEventListener('click', onCardClick);
        grid.appendChild(card);
      });
    }

    function onCardClick(e) {
      const card = e.currentTarget;
      if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;

      if (!timerID && moves === 0 && flipped.length === 0) startTimer();

      card.classList.add('flipped');
      flipped.push(card);

      if (flipped.length === 2) {
        locked = true;
        moves++;
        document.getElementById('moves').textContent = moves;
        checkMatch();
      }
    }

    function checkMatch() {
      const [a, b] = flipped;
      if (a.dataset.emoji === b.dataset.emoji) {
        setTimeout(() => {
          a.classList.add('matched');
          b.classList.add('matched');
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flipped = [];
          locked = false;
          matched++;
          document.getElementById('pairs').textContent = `${matched}/${TOTAL_PAIRS}`;
          if (matched === TOTAL_PAIRS) showWin();
        }, 300);
      } else {
        setTimeout(() => {
          a.classList.remove('flipped');
          b.classList.remove('flipped');
          flipped = [];
          locked = false;
        }, 900);
      }
    }

    function showWin() {
      stopTimer();
      document.getElementById('winStats').innerHTML =
        `Completed in <span>${fmt(seconds)}</span> with <span>${moves}</span> moves.`;
      document.getElementById('winOverlay').classList.add('show');
    }

    initGame();
  </script>
</body>
</html>
